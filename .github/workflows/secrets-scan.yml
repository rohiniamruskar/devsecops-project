#API keys ,sensitive data, credentials
# Gitleaks
name: secrets can

on:
    workflow_call:

jobs:
    secrets-scan:
        runs-on: ubuntu-latest
        
        steps:

            - name: Checkout code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0

            - name: Run GitLeaks scanner
              uses: gitleaks/gitleaks-action@v2
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # github actions manages it
